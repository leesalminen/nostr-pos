name: CI

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  pwa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run protocol:check
      - run: npm run check
      - run: npm run test
      - run: npm run build

  dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: cd packages/nostr_pos && dart pub get && dart analyze && dart test
      - run: cd apps/nostr_pos_cli && dart pub get && dart analyze && dart test
