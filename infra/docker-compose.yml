services:
  relay:
    image: scsibug/nostr-rs-relay:latest
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info

  elements:
    image: ghcr.io/vulpemventures/elements:latest
    command: ["elementsd", "-regtest=1", "-server=1", "-txindex=1", "-fallbackfee=0.00001", "-rpcuser=liquid", "-rpcpassword=liquid", "-rpcbind=0.0.0.0", "-rpcallowip=0.0.0.0/0"]
    ports:
      - "18884:18884"
